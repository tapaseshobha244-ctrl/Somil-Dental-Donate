kind = "web"
previewPath = "/"
title = "Somil Dental Clinic"
version = "1.0.0"
id = "artifacts/sdc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19970

[services.development]
run = "pnpm --filter @workspace/sdc-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sdc-website", "run", "build" ]
publicDir = "artifacts/sdc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19970"
BASE_PATH = "/"
